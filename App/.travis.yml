dist: xenial
sudo: false

language: node_js
node_js:
    - '10'

cache:
    directories:
        - ./node_modules

install:
    - yarn install

before_deploy:
    - yarn run build --prod --base-href /police-events/
    - cp dist/police-events/index.html dist/police-events/404.html

deploy:
    provider: pages
    skip_cleanup: true
    github_token: $GITHUB_TOKEN
    local_dir: dist/police-events
    on:
        branch: main
