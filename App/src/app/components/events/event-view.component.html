<div *ngIf="isLoading">
    <p-progressSpinner [style]="{width: '25px', height: '25px'}" strokeWidth="8">
    </p-progressSpinner>
</div>
<div *ngIf="event && id">
    Händelse-id: {{id}}
    <app-event [event]="event" [isLoading]="isLoading" (onShowOnMap)="onShowOnMap($event)">
    </app-event>
</div>
